version: "3.9"

services:
  mongodb:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/home-services
      JWT_SECRET: change_me
      CLIENT_URL: http://localhost
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo_data:
